                  name: "Engine Oil 5W-30 (1L)"
                  category: "Lubricants"
                  quantity: 84
                  reorder_level: 20
                  unit_price: 650.00
                  supplier: "Castrol India"
                  created_at: "2026-04-19T01:40:54Z"
                  updated_at: "2026-04-19T01:40:54Z"
        "401":
